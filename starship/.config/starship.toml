add_newline = false

format = """
[оӮ¶](fg:#539bf5)\
$directory\
[оӮҙ](fg:#539bf5 bg:#73799e)\
$git_branch\
$git_status\
[оӮҙ](bg:#565a6e fg:#73799e)\
$nodejs\
$rust\
$golang\
$python\
$php\
[оӮҙ ](fg:#565a6e)\
$fill\
[оӮ¶](fg:#73799e)\
[ у°Ғ№](fg:#e9e9ed bg:#73799e)\
$battery\
[оӮ¶](bg:#73799e fg:#565a6e)\
$time\
[оӮҙ ](fg:#565a6e)
$character"""

[fill]
symbol = " "

[directory]
style = "fg:#303446  bg:#539bf5"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "вҖҰ/"
truncate_to_repo = false

[git_branch]
symbol = "пҗҳ"
style = "bg:#00C1FF"
format = '[[ $symbol $branch ](fg:#e9e9ed bg:#73799e)]($style)'

[git_status]
style = "bg:#34548a"
format = '[[$all_status$ahead_behind](fg:#e9e9ed bg:#73799e)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#394260"
format = '[[ $symbol ($version) ](fg:#e9e9ed bg:#565a6e)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:#394260"
format = '[[ $symbol ($version \($virtualenv\)) ](fg:#e9e9ed bg:#565a6e)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#394260"
format = '[[ $symbol ($version) ](fg:#e9e9ed bg:#565a6e)]($style)'

[battery]
format = '[[ $percentage ](fg:#e9e9ed bg:#73799e)]($style)'

[[battery.display]]
threshold = 100

[time]
disabled = false
time_format = "пҖ— %R пҒі %d/%m"
style = "bg:#565a6e"
format = '[[ $time ](fg:#e9e9ed bg:#565a6e)]($style)'
